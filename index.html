<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Card</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main class="birthday-card">
    <section class="cover" id="cover">
      <button class="sticker" id="sticker" type="button" aria-label="생일 카드 열기">
        <img class="sticker-dog" src="./dog1.jpeg" alt="birthday dog">
      </button>

      <div class="open-text">채영님 선물 🎁</div>
      <div class="tap-text">멍멍이를 눌러보세요 🐾</div>
    </section>

    <section class="inside" id="inside">
      <div class="stage">
        <div class="message">Early Happy Birthday!</div>
        <div class="sub-message">77ㅑ~ 미리 생일 축하함니다! 행복한 하루 보내세요🩷</div>

        <div class="firework f1"></div>
        <div class="firework f2"></div>
        <div class="firework f3"></div>
        <div class="firework f4"></div>
        <div class="firework f5"></div>

        <div class="speech">🎉 멍멍 🎂</div>

        <img class="cake" src="./cake.png" alt="birthday cake">
        <img class="dog" src="./dog.png" alt="birthday dog">
      </div>
    </section>
  </main>

  <script>
    const sticker = document.getElementById("sticker");
    const cover = document.getElementById("cover");
    const inside = document.getElementById("inside");

    sticker.addEventListener("click", () => {
      cover.classList.add("hide");
      inside.classList.add("show");
    });
  </script>
</body>
</html>
